services:
  app:
    build: .
    env_file: .dev.vars
    restart: unless-stopped
    volumes:
      - fa_cache:/cache
    environment:
      CACHE_DIR: /cache

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  fa_cache:
